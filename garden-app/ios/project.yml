name: GardenChat
options:
  createWorkspace: true
  deploymentTarget:
    iOS: '17.0'
packages:
  ExyteChat:
    url: https://github.com/exyte/Chat
    from: 2.6.3
targets:
  GardenCore:
    type: framework
    platform: iOS
    sources: [GardenCore/Sources]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.garden.core
        DEVELOPMENT_TEAM: 44N4NZ86S5
        CODE_SIGN_STYLE: Automatic
  GardenChat:
    type: application
    platform: iOS
    sources:
      - GardenChat/Sources
      - GardenChat/LaunchScreen.storyboard
      - path: GardenChat/Sources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: GardenCore
      - package: ExyteChat
        product: ExyteChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.garden.chat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 44N4NZ86S5
        CODE_SIGN_STYLE: Automatic
    info:
      path: GardenChat/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
  GardenUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [GardenUITests]
    dependencies:
      - target: GardenChat
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.garden.uitests
        TEST_TARGET_NAME: GardenChat
