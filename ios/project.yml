name: GardenChat
options:
  createWorkspace: true
  deploymentTarget:
    iOS: '17.0'
packages:
  ExyteChat:
    url: https://github.com/exyte/Chat
    from: 2.6.3
targets:
  GardenCore:
    type: framework
    platform: iOS
    sources: [GardenCore/Sources]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.garden.core
  GardenChat:
    type: application
    platform: iOS
    sources: [GardenChat/Sources, GardenChat/LaunchScreen.storyboard]
    dependencies:
      - target: GardenCore
      - package: ExyteChat
        product: ExyteChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.garden.chat
    info:
      path: GardenChat/Info.plist
